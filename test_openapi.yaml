openapi: 3.0.0
info:
  title: HTTPBin API
  description: API de prueba usando httpbin.org
  version: 1.0.0
servers:
  - url: https://httpbin.org
    description: Servidor público de pruebas
paths:
  /get:
    get:
      summary: Retorna datos GET
      responses:
        '200':
          description: Respuesta exitosa
  /headers:
    get:
      summary: Retorna los headers del request
      responses:
        '200':
          description: Headers del cliente
  /ip:
    get:
      summary: Retorna la IP del cliente
      responses:
        '200':
          description: IP de origen
